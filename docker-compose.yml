version: "3.9"

# ═══════════════════════════════════════════════════════════════════════
# THE FORGE — Local Development Environment
# docker-compose.yml
#
# Services:
#   postgres  — PostgreSQL 16 with pgvector extension
#   redis     — Redis 7 for job queue
#   api       — FastAPI server (hot reload)
#   worker    — RQ pipeline worker
#   dashboard — React/Vite dashboard (served via nginx)
#
# Usage:
#   docker compose up --build
#   API:       http://localhost:8000
#   Dashboard: http://localhost:5173
#   Docs:      http://localhost:8000/docs
# ═══════════════════════════════════════════════════════════════════════

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge_dev_password
      POSTGRES_DB: the_forge
    ports:
      - "5432:5432"
    volumes:
      - forge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d the_forge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - forge_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://forge:forge_dev_password@postgres:5432/the_forge
      REDIS_URL: redis://redis:6379
      APP_ENV: development
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://forge:forge_dev_password@postgres:5432/the_forge
      REDIS_URL: redis://redis:6379
      APP_ENV: development
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python pipeline/worker.py
    restart: unless-stopped

  dashboard:
    build:
      context: ./web-dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  forge_postgres_data:
  forge_redis_data:
