server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — all paths return index.html.
    # No-cache headers are set here because try_files internally redirects to
    # /index.html, bypassing the `location = /index.html` block. Without these
    # headers the browser caches the HTML and gets stale chunk filenames after
    # a new deploy, causing "Failed to fetch dynamically imported module" errors.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Service worker — must never be cached to ensure updates propagate
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header Content-Type "application/javascript";
        add_header Service-Worker-Allowed "/";
    }

    # PWA manifest
    location = /manifest.json {
        add_header Cache-Control "no-cache";
        types {
            application/manifest+json json;
        }
    }

    # PWA icons
    location /icons/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        types {
            image/png png;
            image/svg+xml svg;
        }
    }

    # Cache static assets (excluding sw.js which is handled above)
    location ~* \.(js|css|png|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cache for index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/manifest+json text/xml application/xml image/svg+xml;
}