app = "the-forge-dashboard"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  VITE_API_BASE_URL = "https://the-forge-api.fly.dev"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/"
    timeout = "5s"

[[vm]]
  cpu_kind = "performance"
  cpus = 2
  memory_mb = 512
