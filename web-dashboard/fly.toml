app = "the-forge-dashboard-v11"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

  [build.args]
    VITE_API_BASE_URL = "https://the-forge-api.fly.dev"
    VITE_API_SECRET_KEY = "bc10f8ba91591da2e84f97212096ca185e7e9d9dc5b96ce8d6fce8f441938863"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
