app = "the-forge-api"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile.api"

[env]
  APP_ENV = "production"
  APP_PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 4
  memory_mb = 2048
